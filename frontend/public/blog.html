<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — E.S Terraplenagem e Construções LTDA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .post-hero {
      width: 100%;
      max-height: 500px;
      object-fit: cover;
      display: block;
      margin-top: 70px;
    }
    .post-content {
      max-width: 800px;
      margin: 0 auto;
      padding: 3rem 5%;
    }
    .post-data {
      font-size: .8rem;
      color: var(--yellow);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .post-titulo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1.1;
      margin-bottom: 1.5rem;
    }
    .post-body {
      color: #ccc;
      font-size: 1.05rem;
      line-height: 1.9;
    }
    .post-body p {
      margin-bottom: 1.5rem;
    }
    .post-voltar {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--yellow);
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      margin-bottom: 2rem;
      transition: gap .3s;
    }
    .post-voltar:hover { gap: 12px; }
    .post-loading {
      text-align: center;
      padding: 5rem;
      color: #555;
      font-size: 1.1rem;
    }
    .posts-lista {
      max-width: 1000px;
      margin: 0 auto;
      padding: 3rem 5%;
    }
    .posts-lista h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      margin-bottom: 2rem;
      letter-spacing: 2px;
    }
    .posts-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav id="navbar">
  <a href="/" class="nav-brand">
    E.S Terraplenagem
    <small>e Construções LTDA</small>
  </a>
  <ul class="nav-links" id="navLinks">
    <li><a href="/#servicos">Serviços</a></li>
    <li><a href="/#sobre">Sobre</a></li>
    <li><a href="/#projetos">Projetos</a></li>
    <li><a href="/blog.html" class="ativo">Notícias</a></li>
    <li><a href="/#contato" class="nav-cta">Orçamento</a></li>
  </ul>
  <button class="menu-btn" id="menuBtn" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- CONTEÚDO DINÂMICO -->
<div id="conteudo">
  <div class="post-loading">Carregando...</div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-brand">
    E.S Terraplenagem
    <small>e Construções LTDA</small>
  </div>
  <ul class="footer-links">
    <li><a href="/#servicos">Serviços</a></li>
    <li><a href="/#sobre">Sobre</a></li>
    <li><a href="/#projetos">Projetos</a></li>
    <li><a href="/blog.html">Blog</a></li>
    <li><a href="/#contato">Contato</a></li>
  </ul>
  <div class="footer-copy">© 2025 E.S Terraplenagem e Construções LTDA. Todos os direitos reservados.</div>
</footer>

<script>
  // Menu mobile
  const menuBtn = document.getElementById('menuBtn');
  const navLinks = document.getElementById('navLinks');
  menuBtn?.addEventListener('click', () => navLinks?.classList.toggle('aberto'));

  // Verifica se tem slug na URL
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');

  if (slug) {
    carregarPost(slug);
  } else {
    carregarListaPosts();
  }

  // ── CARREGAR POST INDIVIDUAL ──
  async function carregarPost(slug) {
    try {
      const res  = await fetch(`/api/blog/${slug}`);
      if (!res.ok) {
        document.getElementById('conteudo').innerHTML = `
          <div class="post-content">
            <a href="/blog.html" class="post-voltar">← Voltar ao blog</a>
            <p style="color:#888">Post não encontrado.</p>
          </div>`;
        return;
      }
      const post = await res.json();
      const data = post.publicado_em
        ? new Date(post.publicado_em).toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' })
        : '';

      document.title = `${post.titulo} — E.S Terraplenagem`;

      // Formata parágrafos do conteúdo
      const paragrafos = post.conteudo
        .split('\n')
        .filter(p => p.trim())
        .map(p => `<p>${p}</p>`)
        .join('');

      document.getElementById('conteudo').innerHTML = `
        ${post.capa ? `<img src="${post.capa}" alt="${post.titulo}" class="post-hero">` : '<div style="height:70px"></div>'}
        <div class="post-content">
          <a href="/blog.html" class="post-voltar">← Voltar ao blog</a>
          <div class="post-data">${data}</div>
          <h1 class="post-titulo">${post.titulo}</h1>
          <div class="post-body">${paragrafos}</div>
        </div>`;
    } catch (e) {
      document.getElementById('conteudo').innerHTML = `
        <div class="post-content">
          <a href="/blog.html" class="post-voltar">← Voltar ao blog</a>
          <p style="color:#888">Erro ao carregar post.</p>
        </div>`;
    }
  }

  // ── LISTAR TODOS OS POSTS ──
  async function carregarListaPosts() {
    try {
      const res  = await fetch('/api/blog?limite=20');
      const data = await res.json();

      if (!data.dados?.length) {
        document.getElementById('conteudo').innerHTML = `
          <div class="posts-lista" style="margin-top:70px">
            <div class="tag">Notícias</div>
            <h1>Blog</h1>
            <p style="color:#888">Nenhuma notícia publicada ainda.</p>
          </div>`;
        return;
      }

      const cards = data.dados.map(post => {
        const dataFmt = post.publicado_em
          ? new Date(post.publicado_em).toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' })
          : '';
        return `
          <article class="post-card">
            <div class="post-card-img">
              ${post.capa
                ? `<img src="${post.capa}" alt="${post.titulo}" loading="lazy">`
                : '<div style="background:#1a1a1a;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem">📰</div>'
              }
            </div>
            <div class="post-card-body">
              <div class="post-card-data">${dataFmt}</div>
              <h3 class="post-card-titulo">${post.titulo}</h3>
              <p class="post-card-resumo">${post.resumo || ''}</p>
              <a href="/blog.html?slug=${post.slug}" class="post-card-link">Ler mais →</a>
            </div>
          </article>`;
      }).join('');

      document.getElementById('conteudo').innerHTML = `
        <div class="posts-lista" style="margin-top:70px">
          <div class="tag">Notícias</div>
          <h1>Blog</h1>
          <div class="posts-cards">${cards}</div>
        </div>`;
    } catch (e) {
      document.getElementById('conteudo').innerHTML = `
        <div class="posts-lista" style="margin-top:70px">
          <p style="color:#888">Erro ao carregar posts.</p>
        </div>`;
    }
  }
</script>
</body>
</html>
