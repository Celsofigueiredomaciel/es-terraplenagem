<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — E.S Terraplenagem</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <style>
    .senha-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .senha-wrapper input {
      width: 100%;
      padding-right: 42px;
    }
    .btn-olho {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      opacity: 0.5;
      transition: opacity .2s;
    }
    .btn-olho:hover { opacity: 1; }
    .btn-olho svg { width: 20px; height: 20px; stroke: #1d1d1d; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  </style>
</head>
<body class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div style="font-size:3rem">🚜</div>
      <div class="login-titulo">E.S Terraplenagem</div>
      <div class="login-sub">Painel Administrativo</div>
    </div>
    <form id="form-login">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="admin@esterraplenagem.com.br" required autofocus>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <div class="senha-wrapper">
          <input type="password" id="senha" placeholder="••••••••" required>
          <button type="button" class="btn-olho" id="btn-olho" title="Mostrar/ocultar senha">
            <!-- Ícone olho aberto -->
            <svg id="icone-olho" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <!-- Ícone olho fechado (oculto inicialmente) -->
            <svg id="icone-olho-fechado" viewBox="0 0 24 24" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="login-erro" id="login-erro"></div>
      <button type="submit" class="btn-login" id="btn-login">Entrar</button>
    </form>
    <a href="/" class="login-voltar">← Voltar ao site</a>
  </div>
  <script>
    if (localStorage.getItem('es_token')) location.href = '/admin/dashboard.html';

    // ── Botão olho ──────────────────────────────────
    document.getElementById('btn-olho').addEventListener('click', () => {
      const input     = document.getElementById('senha');
      const olho      = document.getElementById('icone-olho');
      const olhoFech  = document.getElementById('icone-olho-fechado');
      const visivel   = input.type === 'text';
      input.type      = visivel ? 'password' : 'text';
      olho.style.display      = visivel ? 'block' : 'none';
      olhoFech.style.display  = visivel ? 'none'  : 'block';
    });

    // ── Login ───────────────────────────────────────
    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn  = document.getElementById('btn-login');
      const erro = document.getElementById('login-erro');
      btn.disabled = true; btn.textContent = 'Entrando...';
      erro.style.display = 'none';
      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            senha: document.getElementById('senha').value
          })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('es_token',   data.token);
          localStorage.setItem('es_usuario', JSON.stringify(data.usuario));
          location.href = '/admin/dashboard.html';
        } else {
          erro.textContent = data.erro || 'Credenciais inválidas';
          erro.style.display = 'block';
        }
      } catch {
        erro.textContent = 'Erro de conexão. Backend offline?';
        erro.style.display = 'block';
      }
      btn.disabled = false; btn.textContent = 'Entrar';
    });
  </script>
</body>
</html>
