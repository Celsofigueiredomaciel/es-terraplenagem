<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — E.S Terraplenagem</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="login-page">

  <div class="login-box">
    <div class="login-logo">
      <div style="font-size:3rem">🚜</div>
      <div class="login-titulo">E.S Terraplenagem</div>
      <div class="login-sub">Painel Administrativo</div>
    </div>

    <form id="form-login">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="admin@esterraplenagem.com.br" required autofocus>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="••••••••" required>
      </div>
      <div class="login-erro" id="login-erro"></div>
      <button type="submit" class="btn-login" id="btn-login">Entrar</button>
    </form>

    <a href="/" class="login-voltar">← Voltar ao site</a>
  </div>

  <script>
    if (localStorage.getItem('es_token')) location.href = '/admin/dashboard.html';

    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn  = document.getElementById('btn-login');
      const erro = document.getElementById('login-erro');
      btn.disabled = true; btn.textContent = 'Entrando...';
      erro.style.display = 'none';

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            senha: document.getElementById('senha').value
          })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('es_token',   data.token);
          localStorage.setItem('es_usuario', JSON.stringify(data.usuario));
          location.href = '/admin/dashboard.html';
        } else {
          erro.textContent = data.erro || 'Credenciais inválidas';
          erro.style.display = 'block';
        }
      } catch {
        erro.textContent = 'Erro de conexão. Backend offline?';
        erro.style.display = 'block';
      }
      btn.disabled = false; btn.textContent = 'Entrar';
    });
  </script>
</body>
</html>
