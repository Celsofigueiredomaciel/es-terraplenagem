<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nossa História — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <style>
    /* ── CARDS DE SLIDE ── */
    .historia-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
      margin-top: 1rem;
    }

    .slide-card {
      position: relative;
      height: 220px;
      border-radius: 8px;
      overflow: hidden;
      background: #1a1a1a;
    }

    /* foto de fundo */
    .slide-card-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .4s ease;
    }

    .slide-card:hover .slide-card-bg {
      transform: scale(1.04);
    }

    /* gradiente sobre a foto */
    .slide-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,.90) 0%,
        rgba(0,0,0,.40) 50%,
        rgba(0,0,0,.20) 100%
      );
    }

    /* texto sobre a foto */
    .slide-card-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 1rem 1.1rem;
      z-index: 2;
    }

    .slide-card-titulo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 2px;
      color: #FFD700;
      margin-bottom: .25rem;
      text-shadow: 0 2px 8px rgba(0,0,0,.8);
    }

    .slide-card-texto {
      font-size: .82rem;
      color: rgba(255,255,255,.8);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* badge ativo/inativo */
    .slide-badge {
      position: absolute;
      top: 10px; left: 10px;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 3px 10px;
      border-radius: 20px;
      z-index: 3;
    }
    .slide-badge.ativo   { background: rgba(76,175,80,.85);  color: #fff; }
    .slide-badge.inativo { background: rgba(244,67,54,.85);  color: #fff; }

    .slide-ordem {
      position: absolute;
      top: 10px; right: 10px;
      background: rgba(0,0,0,.7);
      color: #FFD700;
      font-family: 'Bebas Neue', sans-serif;
      font-size: .95rem;
      letter-spacing: 1px;
      padding: 2px 10px;
      border-radius: 4px;
      z-index: 3;
    }

    /* botões do card */
    .slide-card-btns {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: .6rem;
      opacity: 0;
      transition: opacity .25s;
      z-index: 4;
    }

    .slide-card:hover .slide-card-btns { opacity: 1; }

    .btn-card {
      font-size: .8rem;
      font-weight: 600;
      padding: .45rem .9rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: filter .2s;
    }
    .btn-card:hover { filter: brightness(1.15); }
    .btn-card.editar   { background: #FFD700; color: #111; }
    .btn-card.toggle   { background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.3); }
    .btn-card.deletar  { background: rgba(244,67,54,.85); color: #fff; }

    /* ── OVERLAY DE EDIÇÃO ── */
    .edit-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.88);
      z-index: 10;
      display: none;
      flex-direction: column;
      padding: .9rem 1rem;
      gap: .55rem;
      overflow-y: auto;
    }

    .edit-overlay.aberto { display: flex; }

    .edit-overlay label {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 2px;
      display: block;
    }

    .edit-overlay input,
    .edit-overlay textarea {
      width: 100%;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      color: #fff;
      border-radius: 4px;
      padding: .4rem .6rem;
      font-size: .85rem;
      font-family: 'Barlow', sans-serif;
      resize: none;
    }

    .edit-overlay input:focus,
    .edit-overlay textarea:focus {
      outline: none;
      border-color: #FFD700;
    }

    .edit-overlay input[type="file"] {
      padding: .3rem;
      font-size: .78rem;
      color: #aaa;
    }

    .edit-overlay .preview-mini {
      width: 100%;
      height: 60px;
      object-fit: cover;
      border-radius: 4px;
      display: none;
      margin-top: .25rem;
    }

    .edit-row { display: flex; gap: .5rem; }
    .edit-row > div { flex: 1; }

    .edit-overlay-btns {
      display: flex;
      gap: .5rem;
      margin-top: .25rem;
    }

    .btn-salvar {
      flex: 1;
      background: #FFD700;
      color: #111;
      font-weight: 700;
      font-size: .85rem;
      padding: .45rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .btn-cancelar {
      background: rgba(255,255,255,.1);
      color: #aaa;
      font-size: .85rem;
      padding: .45rem .75rem;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 4px;
      cursor: pointer;
    }

    .edit-msg {
      font-size: .78rem;
      text-align: center;
      min-height: 1rem;
    }
  </style>
</head>
<body>

<div class="admin-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div style="font-size:1.5rem">🏗️</div>
      <div class="sidebar-logo-txt">E.S Admin</div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="midias.html">🖼️ Mídias</a>
      <a href="produtos.html">📦 Produtos</a>
      <a href="historia.html" class="ativo">📖 Nossa História</a>
      <a href="orcamentos.html">📋 Orçamentos</a>
      <a href="blog-admin.html">📝 Blog</a>
      <a href="configuracoes.html">⚙️ Configurações</a>
    </nav>
    <button class="sidebar-sair" id="btn-sair">🚪 Sair</button>
  </aside>

  <!-- CONTEÚDO -->
  <main class="admin-main">
    <div class="admin-header">
      <div>
        <h1>📖 Nossa História</h1>
        <p style="color:#888;margin-top:.25rem">
          Slides exibidos na seção "Nossa História" do site
        </p>
      </div>
    </div>

    <!-- FORMULÁRIO NOVO SLIDE -->
    <div class="card" style="margin-bottom:2rem">
      <h2 style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;
                 letter-spacing:2px;margin-bottom:1.25rem">➕ Novo Slide</h2>
      <form id="form-novo" enctype="multipart/form-data">
        <div class="form-row">
          <div class="form-group">
            <label>Título *</label>
            <input type="text" name="titulo"
                   placeholder="Ex: Compromisso Ambiental" required>
          </div>
          <div class="form-group">
            <label>Ordem (0 = primeiro)</label>
            <input type="number" name="ordem" value="0" min="0">
          </div>
        </div>
        <div class="form-group">
          <label>Texto curto</label>
          <textarea name="texto" rows="2"
                    placeholder="Uma frase sobre este tema (máx. 300 caracteres)"
                    maxlength="300"></textarea>
        </div>
        <div class="form-group">
          <label>Foto *</label>
          <input type="file" id="foto-novo" name="foto"
                 accept="image/jpeg,image/png,image/webp" required>
          <small style="color:#888">
            Preferencialmente horizontal — mín. 1200×700px
          </small>
          <img id="preview-novo" style="max-height:120px;border-radius:6px;
               object-fit:cover;margin-top:.75rem;display:none">
        </div>
        <div style="display:flex;gap:1rem;align-items:center;margin-top:1rem">
          <button type="submit" class="btn-admin btn-primary">💾 Salvar Slide</button>
          <span id="msg-novo" style="font-size:.9rem"></span>
        </div>
      </form>
    </div>

    <!-- LISTA DE SLIDES -->
    <div class="card">
      <h2 style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;
                 letter-spacing:2px;margin-bottom:1.25rem">🗂️ Slides Cadastrados</h2>
      <div class="historia-grid" id="lista-slides">
        <p style="color:#888">Carregando...</p>
      </div>
    </div>
  </main>
</div>

<script>
const TOKEN = localStorage.getItem('es_token');
if (!TOKEN) location.href = '/admin/login.html';

document.getElementById('btn-sair').onclick = () => {
  localStorage.removeItem('es_token');
  location.href = '/admin/login.html';
};

// preview foto — novo
document.getElementById('foto-novo').addEventListener('change', function () {
  const prev = document.getElementById('preview-novo');
  if (!this.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => { prev.src = e.target.result; prev.style.display = 'block'; };
  reader.readAsDataURL(this.files[0]);
});

// ── SALVAR NOVO ──────────────────────────────────────
document.getElementById('form-novo').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('msg-novo');
  const btn = e.target.querySelector('button[type=submit]');
  btn.disabled = true; btn.textContent = 'Salvando...';

  try {
    const res  = await fetch('/api/historia', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + TOKEN },
      body: new FormData(e.target)
    });
    const json = await res.json();
    if (res.ok) {
      msg.style.color = '#4caf50';
      msg.textContent = '✅ ' + json.mensagem;
      e.target.reset();
      document.getElementById('preview-novo').style.display = 'none';
      carregarSlides();
    } else {
      msg.style.color = '#f44336';
      msg.textContent = '❌ ' + (json.erro || 'Erro ao salvar');
    }
  } catch {
    msg.style.color = '#f44336';
    msg.textContent = '❌ Sem conexão com o servidor';
  }
  btn.disabled = false; btn.textContent = '💾 Salvar Slide';
});

// ── CARREGAR LISTA ───────────────────────────────────
async function carregarSlides() {
  const lista = document.getElementById('lista-slides');
  try {
    const res  = await fetch('/api/historia/admin', {
      headers: { Authorization: 'Bearer ' + TOKEN }
    });
    const data = await res.json();

    if (!data.length) {
      lista.innerHTML = '<p style="color:#888;grid-column:1/-1">Nenhum slide cadastrado ainda.</p>';
      return;
    }

    lista.innerHTML = data.map(s => `
      <div class="slide-card" id="card-${s.id}">

        <!-- foto de fundo -->
        <img class="slide-card-bg" src="${s.arquivo}" alt="${s.titulo}">
        <div class="slide-card-overlay"></div>

        <!-- badges -->
        <div class="slide-badge ${s.ativo ? 'ativo' : 'inativo'}">
          ${s.ativo ? '● Ativo' : '● Inativo'}
        </div>
        <div class="slide-ordem">#${s.ordem}</div>

        <!-- texto sobre a foto -->
        <div class="slide-card-info">
          <div class="slide-card-titulo">${s.titulo}</div>
          <div class="slide-card-texto">${s.texto || ''}</div>
        </div>

        <!-- botões (aparecem no hover) -->
        <div class="slide-card-btns">
          <button class="btn-card editar"
                  onclick="abrirEdicao(${s.id})">✏️ Editar</button>
          <button class="btn-card toggle"
                  onclick="toggleAtivo(${s.id}, ${s.ativo})">
            ${s.ativo ? 'Desativar' : 'Ativar'}
          </button>
          <button class="btn-card deletar"
                  onclick="remover(${s.id})">🗑️</button>
        </div>

        <!-- OVERLAY DE EDIÇÃO (sobre a foto) -->
        <div class="edit-overlay" id="edit-${s.id}">
          <div class="edit-row">
            <div>
              <label>Título</label>
              <input type="text" id="et-${s.id}" value="${s.titulo}">
            </div>
            <div style="max-width:70px">
              <label>Ordem</label>
              <input type="number" id="eo-${s.id}" value="${s.ordem}" min="0">
            </div>
          </div>
          <div>
            <label>Texto curto</label>
            <textarea id="ex-${s.id}" rows="2" maxlength="300">${s.texto || ''}</textarea>
          </div>
          <div>
            <label>Trocar foto (opcional)</label>
            <input type="file" id="ef-${s.id}"
                   accept="image/jpeg,image/png,image/webp"
                   onchange="previewEdicao(this, ${s.id})">
            <img id="ep-${s.id}" class="preview-mini">
          </div>
          <div class="edit-overlay-btns">
            <button class="btn-salvar"
                    onclick="salvarEdicao(${s.id})">💾 Salvar</button>
            <button class="btn-cancelar"
                    onclick="fecharEdicao(${s.id})">Cancelar</button>
          </div>
          <div class="edit-msg" id="em-${s.id}"></div>
        </div>

      </div>`).join('');

  } catch {
    lista.innerHTML = '<p style="color:#f44336;grid-column:1/-1">Erro ao carregar slides.</p>';
  }
}

// ── ABRIR / FECHAR EDIÇÃO ────────────────────────────
function abrirEdicao(id) {
  document.getElementById('edit-' + id).classList.add('aberto');
}
function fecharEdicao(id) {
  document.getElementById('edit-' + id).classList.remove('aberto');
  document.getElementById('em-' + id).textContent = '';
}

// preview foto dentro do overlay
function previewEdicao(input, id) {
  const prev = document.getElementById('ep-' + id);
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => { prev.src = e.target.result; prev.style.display = 'block'; };
  reader.readAsDataURL(input.files[0]);
}

// ── SALVAR EDIÇÃO ────────────────────────────────────
async function salvarEdicao(id) {
  const msg  = document.getElementById('em-' + id);
  const fd   = new FormData();
  fd.append('titulo', document.getElementById('et-' + id).value);
  fd.append('texto',  document.getElementById('ex-' + id).value);
  fd.append('ordem',  document.getElementById('eo-' + id).value);

  const fotoInput = document.getElementById('ef-' + id);
  if (fotoInput.files[0]) fd.append('foto', fotoInput.files[0]);

  try {
    const res  = await fetch('/api/historia/' + id, {
      method: 'PUT',
      headers: { Authorization: 'Bearer ' + TOKEN },
      body: fd
    });
    const json = await res.json();
    if (res.ok) {
      msg.style.color = '#4caf50';
      msg.textContent = '✅ Salvo!';
      setTimeout(() => { fecharEdicao(id); carregarSlides(); }, 1000);
    } else {
      msg.style.color = '#f44336';
      msg.textContent = '❌ ' + (json.erro || 'Erro ao salvar');
    }
  } catch {
    msg.style.color = '#f44336';
    msg.textContent = '❌ Sem conexão';
  }
}

// ── TOGGLE ATIVO ─────────────────────────────────────
async function toggleAtivo(id, ativoAtual) {
  await fetch('/api/historia/' + id, {
    method: 'PUT',
    headers: {
      Authorization: 'Bearer ' + TOKEN,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ ativo: ativoAtual ? 0 : 1 })
  });
  carregarSlides();
}

// ── REMOVER ──────────────────────────────────────────
async function remover(id) {
  if (!confirm('Remover este slide permanentemente?')) return;
  await fetch('/api/historia/' + id, {
    method: 'DELETE',
    headers: { Authorization: 'Bearer ' + TOKEN }
  });
  carregarSlides();
}

carregarSlides();
</script>
</body>
</html>
